      lps-commitments-detailed: "get /v2/datasets/odyssey/limited-partners/{lp_id}/commitments/detailed"
      lps-commitments-aggregates: "get /v2/datasets/odyssey/limited-partners/{lp_id}/commitments/aggregates"
      lps-allocations-target: "get /v2/datasets/odyssey/limited-partners/{lp_id}/allocations/target"
      lps-allocations-actual: "get /v2/datasets/odyssey/limited-partners/{lp_id}/allocations/actual"
      lps-commitment-preferences: "get /v2/datasets/odyssey/limited-partners/{lp_id}/commitment-preferences"
      lps-service-providers: "get /v2/datasets/odyssey/limited-partners/{lp_id}/service-providers"
  service-providers:
    methods:
      search: "get /v2/datasets/odyssey/service-providers/search"
      bio: "get /v2/datasets/odyssey/service-providers/{provider_id}/bio"
      companies: "get /v2/datasets/odyssey/service-providers/{provider_id}/companies"
      deals: "get /v2/datasets/odyssey/service-providers/{provider_id}/deals"
      investors: "get /v2/datasets/odyssey/service-providers/{provider_id}/investors"
      funds: "get /v2/datasets/odyssey/service-providers/{provider_id}/funds"
      limited-partners: "get /v2/datasets/odyssey/service-providers/{provider_id}/limited-partners"
  patents:
    methods:
      search: "get /v2/datasets/odyssey/patents/search"
      get-by-id: "get /v2/datasets/odyssey/patents/{id}"
      get-file: "get /v2/datasets/odyssey/patents/{entityId}/file"
  credit-analysis:
    methods:
      news-search: "get /v2/datasets/odyssey/credit-analysis/news/search"
      news-recent: "get /v2/datasets/odyssey/credit-analysis/news/recent"
      news-detail: "get /v2/datasets/odyssey/credit-analysis/news/{newsId}"
      news-attachment: "get /v2/datasets/odyssey/credit-analysis/news/{newsId}/attachment"
      news-bulk: "post /v2/datasets/odyssey/credit-analysis/news/bulk"
