      list-managers: "get /v2/datasets/odyssey/credit-analysis/funds/managers"
      manager-detail: "get /v2/datasets/odyssey/credit-analysis/funds/managers/{name}"
      sba-search: "get /v2/datasets/odyssey/credit-analysis/sba/search"
      sba-stats: "get /v2/datasets/odyssey/credit-analysis/sba/stats"
      agreements-search: "get /v2/datasets/odyssey/credit-analysis/agreements/search"
      agreement-detail: "get /v2/datasets/odyssey/credit-analysis/agreements/{company}"
      nport-funds: "get /v2/datasets/odyssey/credit-analysis/nport/funds"
      nport-search: "get /v2/datasets/odyssey/credit-analysis/nport/search"
      nport-fund-filings: "get /v2/datasets/odyssey/credit-analysis/nport/{ticker}/filings"
      relationships-search: "get /v2/datasets/odyssey/credit-analysis/relationships/search"
      ucc-portals: "get /v2/datasets/odyssey/credit-analysis/relationships/portals"
  sandbox-data:
